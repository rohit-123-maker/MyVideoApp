<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --primary:#38bdf8;
}
.dark{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#222;
  --muted:#666;
  --primary:#0066cc;
}
/*  Welcome Modal Styles  */
    .modal {
      display: block;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
    }
    .modal-content {
    background: linear-gradient(90deg, #FF8B00 0%, #ffffff,#43a047 100%);
    color: rgba(0, 78, 255, 1);
      padding: 20px;
      margin: 15% auto;
      width: 300px;
      text-align: center;
      border-radius: 8px;
    }
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}
/*  background image  */
    .bg-img {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    
header{
  text-align:center;
}
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
  flex-wrap:wrap;
}
input{
  padding:8px 14px;
  border-radius:20px;
  border:none;
}
button{
  padding:8px 14px;
  border-radius:20px;
  border:none;
  background:var(--primary);
  color:white;
  cursor:pointer;
}
.filter-btn{
  background:#1e293b;
  color:#fff;
}
.filter-btn.active{
  background:#38bdf8;
  color:#000;
}
/* Category wrapper */
.category-bar {
  overflow-x: auto;
  white-space: nowrap;
  padding: 5px 0;
  margin-bottom: 10px;
}

.menu-wrapper {
  position: relative;
}

#menu-btn {
  background: var(--card);
  border: none;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  color: var(--text);
}

.menu-box {
  position: absolute;
  top: 45px;
  right: 2;
  width: 200px;
  background: var(--card);
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,.4);
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 9999;
}

.menu-item {
  padding: 12px 16px;
  cursor: pointer;
  color: var(--text);
  transition: 0.2s;
}

.menu-item:hover {
  background: var(--primary);
  color: black;
}

.menu-box hr {
  border: none;
  border-top: 1px solid var(--muted);
}

/* Hide scrollbar */
.category-bar::-webkit-scrollbar {
  height: 0;
}
.category-bar {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.suggestions-box {
  position: absolute;
  background: var(--card);
  width: 250px;
  max-height: 250px;
  overflow-y: auto;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,.4);
  padding: 5px 0;
  display: none;
  z-index: 999;
}

.suggestion-item {
  padding: 8px 15px;
  cursor: pointer;
  color: var(--text);
}

.suggestion-item:hover {
  background: var(--primary);
  color: black;
}

/* Filters inside should be inline-flex */
#filters {
  display: inline-flex;
  gap: 10px;
}

#filters .filter-btn {
  flex: 0 0 auto;
}
#video-feed{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
  width:90%;
  margin:auto;
}
.video-card{
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 16px rgba(0,0,0,.3);
}
video{
  width:100%;
  height:300px;
  background:#0f172a;
}
.video-info{
  padding:15px;
}
mark{
  background:#38bdf8;
  color:#000;
  padding:2px 4px;
  border-radius:4px;
}
.video-card {
  position: relative;
}

.video-watermark {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  pointer-events: none; /* क्लिक रोकता नहीं */
  z-index: 50;
  backdrop-filter: blur(3px);
}

.pip-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,.6);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  z-index: 20;
}
</style>

</div>
   <input type="text" id="search" placeholder="Search videos...">

    <button onclick="toggleDark()">🌙</button>
        <div class="links">
      <i class="fa-solid fa-home"></i><a href="#" target="_blank"> Home </a>
      <i class="fa-solid fa-link"></i><a href="#" target="_blank">All Posts</a>
      <i class="fa-solid fa-link"></i><a href="#" target="_blank">RSS</a>
    </div>
  </div>

<div class="category-bar">
  <div id="filters">
    <button class="filter-btn" data-category="all">All</button>
    <button class="filter-btn" data-category="animation">Animation</button>
    <button class="filter-btn" data-category="nature">Nature</button>
    <button class="filter-btn" data-category="wildlife">Wildlife</button>
    <button class="filter-btn" data-category="music">Music</button>
    <button class="filter-btn" data-category="cartoon">Cartoon</button>

</div>

<main id="video-feed"></main>
<!-- Scripts -->
<script src="/style.js"></script>
<script>
const videoFeed = document.getElementById('video-feed');
const searchInput = document.getElementById('search');
const filterButtons = document.querySelectorAll('.filter-btn');

// 🔄 Restore saved state
let activeCategory = localStorage.getItem('category') || "all";
searchInput.value = localStorage.getItem('search') || "";

const videos = [
  { src:'https://www.w3schools.com/html/mov_bbb.mp4', title:'Big Buck Bunny', desc:'Animation movie', category:'animation' },
  { src:'https://www.w3schools.com/html/movie.mp4', title:'Bear Nature', desc:'Nature and forest', category:'nature' },
  { src:'https://www.w3schools.com/html/mov_bbb.mp4', title:'Wild Animals', desc:'Wildlife documentary', category:'wildlife' },
  { src:'https://www.w3schools.com/html/mov_bbb.mp4', title:'Big Buck Bunny', desc:'Animation movie', category:'animation' },
  { src:'https://www.w3schools.com/html/movie.mp4', title:'Bear Nature', desc:'Nature and forest', category:'nature' },
  { src:'https://www.w3schools.com/html/mov_bbb.mp4', title:'Wild Animals', desc:'Wildlife documentary', category:'wildlife' }
];

// 🔍 Highlight helper
function highlightText(text, query){
  if(!query) return text;
  return text.replace(new RegExp(`(${query})`, 'gi'), '<mark>$1</mark>');
}

// 🔁 Render videos
function renderVideos(filter=""){
  videoFeed.innerHTML = "";

  videos
    .filter(v =>
      (activeCategory === "all" || v.category === activeCategory) &&
      (v.title.toLowerCase().includes(filter) || v.desc.toLowerCase().includes(filter))
    )
    .forEach(video => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
  <div class="pip-btn">PiP</div>
  <div class="video-watermark">MyVideoApp</div>

  <video controls preload="metadata" playsinline webkit-playsinline controlsList="nodownload" class="video-box">
    <source src="${video.src}" type="video/mp4">
  </video>

  <div class="video-info">
    <h3>${highlightText(video.title, filter)}</h3>
    <p>${highlightText(video.desc, filter)}</p>
  </div>
`;
      videoFeed.appendChild(card);
    });

  attachVideoControl();
}

// 🔥 One video at a time
function attachVideoControl(){
  const vids = document.querySelectorAll('video');
  vids.forEach(v => {
    v.addEventListener('play', () => {
      vids.forEach(o => o !== v && o.pause());
    });
  });
}

// ========= MENU TOGGLE =========
const menuBtn = document.getElementById("menu-btn");
const menuBox = document.getElementById("menu-box");

menuBtn.addEventListener("click", () => {
  menuBox.style.display = menuBox.style.display === "flex" ? "none" : "flex";
});

// Outside click → hide menu
document.addEventListener("click", (e) => {
  if (!menuBox.contains(e.target) && e.target !== menuBtn) {
    menuBox.style.display = "none";
  }
});

// ========= WATCH HISTORY =========
let watchHistory = JSON.parse(localStorage.getItem("watchHistory") || "[]");

// Save video when played
function trackWatch(videoObj) {
  watchHistory.unshift(videoObj);
  watchHistory = watchHistory.slice(0, 20);
  localStorage.setItem("watchHistory", JSON.stringify(watchHistory));
}

// Show History
function showWatchHistory() {
  alert("📺 Watch History:\n\n" + 
        watchHistory.map(v => v.title).join("\n"));
}

// ========= LIKED VIDEOS =========
let liked = JSON.parse(localStorage.getItem("likedVideos") || "[]");

function showLiked() {
  alert("❤️ Liked Videos:\n\n" + liked.join("\n"));
}

// ========= SAVED / WATCH LATER =========
let saved = JSON.parse(localStorage.getItem("savedVideos") || "[]");

function showSaved() {
  alert("📌 Watch Later:\n\n" + saved.join("\n"));
}

// ========= CLEAR HISTORY =========
function clearHistory() {
  localStorage.removeItem("watchHistory");
  watchHistory = [];
  alert("🧹 Watch history cleared!");
}

// ⏳ Debounce
function debounce(fn, delay=300){
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
}

// 🔎 Search handler
const debouncedSearch = debounce(e => {
  localStorage.setItem('search', e.target.value.toLowerCase());
  renderVideos(e.target.value.toLowerCase());
});
searchInput.addEventListener('input', debouncedSearch);

// ===== SEARCH HISTORY SYSTEM =====
let searchHistory = JSON.parse(localStorage.getItem("searchHistory") || "[]");

const suggestionBox = document.getElementById("search-suggestions");

// Save search into history
function saveSearch(term) {
  if (!term.trim()) return;
  term = term.toLowerCase();

  // Avoid duplicates
  searchHistory = searchHistory.filter(item => item !== term);

  // add on top
  searchHistory.unshift(term);

  // limit to last 10
  searchHistory = searchHistory.slice(0, 10);

  localStorage.setItem("searchHistory", JSON.stringify(searchHistory));
}

// Show suggestions
function showSuggestions(filter = "") {
  let list = searchHistory;

  if (filter) {
    list = list.filter(item => item.includes(filter.toLowerCase()));
  }

  if (list.length === 0) {
    suggestionBox.style.display = "none";
    return;
  }

  suggestionBox.innerHTML = list
    .map(item => `<div class="suggestion-item">${item}</div>`)
    .join("");

  suggestionBox.style.display = "block";
}

// Click on suggestion → use it
suggestionBox.addEventListener("click", (e) => {
  if (e.target.classList.contains("suggestion-item")) {
    const val = e.target.textContent;
    searchInput.value = val;
    localStorage.setItem("search", val);
    renderVideos(val);
    saveSearch(val);
    suggestionBox.style.display = "none";
  }
});

// Hide on outside click
document.addEventListener("click", (e) => {
  if (!suggestionBox.contains(e.target) && e.target !== searchInput) {
    suggestionBox.style.display = "none";
  }
});

// When typing → show suggestions + search
searchInput.addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();
  showSuggestions(val);
});
searchInput.addEventListener("focus", () => {
  showSuggestions(searchInput.value.toLowerCase());
});

// Save search when pressing Enter
searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const val = searchInput.value.trim();
    if (val) {
      saveSearch(val);
      renderVideos(val.toLowerCase());
      suggestionBox.style.display = "none";
    }
  }
});

// 🏷 Category filter
filterButtons.forEach(btn => {
  if(btn.dataset.category === activeCategory){
    btn.classList.add('active');
  }

  btn.addEventListener('click', () => {
    filterButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.category;
    localStorage.setItem('category', activeCategory);
    renderVideos(searchInput.value.toLowerCase());
  });
});

// Force fullscreen on user fullscreen request (like YouTube)
document.addEventListener("click", function(e) {
    if (e.target.tagName === "VIDEO") return;  // ignore clicks on video

    // if a fullscreenchange happens, ignore
}, true);

function addFullscreenSupport() {
    document.querySelectorAll(".video-player").forEach(video => {
        video.addEventListener("webkitbeginfullscreen", () => {
            // iOS Safari auto fullscreen — nothing needed
        });

        video.addEventListener("fullscreenchange", () => {
            // desktop native
        });

        // When user presses the fullscreen button inside the video UI
        video.addEventListener("enterpictureinpicture", e => {
            e.preventDefault();
        });

        // Detect fullscreen request by API
        video.addEventListener("click", () => {
            // Do nothing on click
        });

        // Override native fullscreen button
        video.addEventListener("webkitfullscreenchange", () => {});
        
        video.addEventListener("webkitbeginfullscreen", () => {});

        // Listen for the built-in fullscreen button request
        video.addEventListener("mouseenter", () => {
            video.onfullscreenchange = () => {};
        });

        // 🎯 MOST IMPORTANT: when user requests fullscreen:
        video.addEventListener("fullscreenrequested", () => {
            forceFullScreen(video);
        });
    });
}

// Enable Picture-in-Picture
function enablePiP() {
  document.querySelectorAll(".video-card").forEach(card => {
    
    const btn = card.querySelector(".pip-btn");
    const video = card.querySelector("video");

    // PiP Button Click
    btn.addEventListener("click", async () => {
      try {
        // अगर PiP में है, तो बाहर निकालो
        if (document.pictureInPictureElement) {
          await document.exitPictureInPicture();
        } else {
          await video.requestPictureInPicture();
        }
      } catch (err) {
        console.log("PiP error:", err);
      }
    });

    // Double click on video → PiP
    video.addEventListener("dblclick", async () => {
      try {
        await video.requestPictureInPicture();
      } catch (err) {}
    });

  });
}

// 🔥 Force fullscreen programmatically
function forceFullScreen(video) {
    if (video.requestFullscreen) video.requestFullscreen();
    else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
    else if (video.msRequestFullscreen) video.msRequestFullscreen();
}

let userPasword = prompt("Enter your password:");
while (userPasword != password) {
  userPasword = prompt("You entered the wrong password. Try again");
}
console.log("Welcome 💐");

// 🌙 Dark mode
function toggleDark(){
  document.body.classList.toggle("dark");
}
  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }
// Initial load
renderVideos(searchInput.value.toLowerCase());
enablePiP();
addFullscreenSupport();

</script>
</body>
